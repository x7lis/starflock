<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>叩響心鐘 · 點亮星空羊群｜互動原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold: #d4af37;
    --gold-bright: #ffd875;
    --ember: #c0392b;
    --ember-bright: #e8613f;
    --bronze-dark: #170d09;
    --bronze-mid: #3c2415;
    --bronze-hi: #6b3e22;
    --ink: #050714;
    --indigo-deep: #0a0e27;
    --indigo-mid: #141b3d;
    --paper: #f4ead8;
    --muted: rgba(244,234,216,.62);
    --serif: 'Noto Serif TC', serif;
    --sans: 'Noto Sans TC', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; overflow:hidden; background:var(--ink); color:var(--paper); font-family:var(--sans);}
  body{position:fixed; inset:0; width:100%; height:100dvh;}

  .scene{
    position:absolute; inset:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .9s ease;
    padding: 6vh 6vw; text-align:center;
  }
  .scene.active{opacity:1; pointer-events:auto;}

  /* ---------- shared UI bits ---------- */
  .eyebrow{
    font-family:var(--sans); font-size:12px; letter-spacing:.3em; font-weight:700;
    color:var(--gold); text-transform:uppercase; margin-bottom:14px; opacity:.85;
  }
  .headline{
    font-family:var(--serif); font-weight:900; font-size:clamp(28px,7.5vw,46px);
    line-height:1.25; margin:0 0 14px; color:var(--paper);
    text-shadow:0 0 30px rgba(212,175,55,.25);
  }
  .sub{
    font-size:14.5px; line-height:1.9; color:var(--muted); max-width:32em; margin:0 auto;
  }
  .btn{
    font-family:var(--sans); font-weight:700; font-size:15px; letter-spacing:.05em;
    padding:15px 34px; border-radius:999px; border:1px solid rgba(212,175,55,.5);
    background:linear-gradient(180deg, rgba(212,175,55,.18), rgba(212,175,55,.05));
    color:var(--gold-bright); cursor:pointer; margin-top:30px;
    transition:transform .15s ease, background .2s ease, box-shadow .2s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn:hover{background:rgba(212,175,55,.22); box-shadow:0 0 24px rgba(212,175,55,.25);}
  .btn.ghost{
    background:transparent; border-color:rgba(244,234,216,.25); color:var(--muted);
    font-size:12.5px; padding:10px 20px; margin-top:14px;
  }
  .badge{
    position:fixed; top:calc(14px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-size:10.5px; letter-spacing:.18em; color:rgba(244,234,216,.4);
    font-family:var(--sans); z-index:50; text-transform:uppercase; pointer-events:none;
  }

  /* ---------- Scene 1: Intro ---------- */
  #scene-intro{ background:radial-gradient(ellipse at 50% 30%, var(--bronze-mid), var(--bronze-dark) 70%); }
  .intro-glyph{
    width:74px; height:74px; margin-bottom:22px; opacity:.9;
    filter:drop-shadow(0 0 18px rgba(212,175,55,.5));
  }
  .permission-note{
    margin-top:22px; font-size:12px; color:rgba(244,234,216,.42); max-width:26em; line-height:1.8;
  }

  /* ---------- Scene 2: Bell ---------- */
  #scene-bell{
    background:
      radial-gradient(ellipse 120% 80% at 50% 15%, rgba(107,62,34,.45), transparent 60%),
      linear-gradient(180deg, var(--bronze-dark), #0d0705 85%);
  }
  .bell-stage{
    position:relative; width:min(72vw,300px); height:min(72vw,300px);
    display:flex; align-items:center; justify-content:center; margin:6px 0 8px;
  }
  #ripple-canvas{ position:absolute; inset:-90%; width:280%; height:280%; pointer-events:none; }
  .bell-wrap{ position:relative; width:64%; transform-origin:50% 6%; will-change:transform; }
  .bell-wrap svg{ width:100%; height:auto; filter:drop-shadow(0 12px 20px rgba(0,0,0,.55)); }
  .bell-wrap.swing{ animation:bellSwing 1.4s cubic-bezier(.36,.07,.19,.97); }
  @keyframes bellSwing{
    0%{transform:rotate(0deg);}
    8%{transform:rotate(9deg);}
    20%{transform:rotate(-7deg);}
    34%{transform:rotate(5deg);}
    50%{transform:rotate(-3deg);}
    68%{transform:rotate(1.5deg);}
    100%{transform:rotate(0deg);}
  }
  .strike-ring{
    position:absolute; width:40%; height:40%; border-radius:50%;
    border:1.5px solid rgba(212,175,55,0); pointer-events:none;
  }
  .status-line{
    display:flex; align-items:center; gap:9px; font-size:12.5px; color:var(--muted);
    margin-top:6px; font-family:var(--sans);
  }
  .status-dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); box-shadow:0 0 8px var(--gold); animation:pulseDot 1.6s ease-in-out infinite; }
  @keyframes pulseDot{ 0%,100%{opacity:.4;} 50%{opacity:1;} }
  .hud{
    position:fixed; bottom:calc(14px + env(safe-area-inset-bottom)); left:0; right:0;
    text-align:center; font-size:10.5px; color:rgba(244,234,216,.32); letter-spacing:.05em;
    font-family:var(--sans);
  }
  .lookup-prompt{
    position:absolute; bottom:9%; left:50%; transform:translateX(-50%) translateY(14px);
    opacity:0; transition:opacity .5s ease, transform .5s ease; width:88%;
  }
  .lookup-prompt.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .lookup-arrow{ font-size:22px; display:block; margin-bottom:6px; animation:floatUp 1.6s ease-in-out infinite; }
  @keyframes floatUp{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  /* ---------- Scene 3: Sky ---------- */
  #scene-sky{
    background:radial-gradient(ellipse at 50% 30%, var(--indigo-mid), var(--indigo-deep) 75%);
    justify-content:flex-end; padding-bottom:6vh;
  }
  #star-canvas{ position:absolute; inset:0; width:100%; height:100%; }
  .sky-copy{ position:relative; z-index:5; }
  .sky-count{
    font-family:var(--serif); font-weight:700; font-size:15px; color:var(--gold-bright);
    margin-top:6px;
  }
  .sky-count b{ font-size:19px; }

  .fallback-row{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; justify-content:center; }

  @media (prefers-reduced-motion: reduce){
    .bell-wrap.swing{ animation:none; }
    .lookup-arrow{ animation:none; }
    .status-dot{ animation:none; }
  }
</style>
</head>
<body>

<div class="badge">互動原型・提案二　叩響心鐘 · 點亮星空羊群</div>

<!-- ================= Scene 1 : Intro ================= -->
<section class="scene active" id="scene-intro">
  <svg class="intro-glyph" viewBox="0 0 64 64" fill="none">
    <path d="M32 6c11 0 18 9 18 20v6l4 8H10l4-8v-6c0-11 7-20 18-20z" stroke="var(--gold)" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M22 46c0 6 4.5 12 10 12s10-6 10-12" stroke="var(--gold)" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M32 6V2" stroke="var(--gold)" stroke-width="2.2" stroke-linecap="round"/>
  </svg>
  <div class="eyebrow">祈福體驗 · 測試版</div>
  <h1 class="headline">叩響心鐘<br>點亮星空羊群</h1>
  <p class="sub">握緊手機，做出「撞鐘」的動作。<br>鐘聲響起、掌心震動之後，抬頭望向天空，<br>為自己點亮一顆吉羊星。</p>
  <button class="btn" id="btn-start">開始體驗</button>
  <p class="permission-note" id="permission-note">此為技術測試頁面，需要裝置的動作感應與音效權限。若使用 iPhone，點擊後會跳出授權視窗，請選擇「允許」。</p>
</section>

<!-- ================= Scene 2 : Bell ================= -->
<section class="scene" id="scene-bell">
  <div class="eyebrow" id="bell-eyebrow">請握緊手機</div>
  <h1 class="headline" style="font-size:clamp(22px,6vw,32px); margin-bottom:4px;">做出撞鐘的動作</h1>
  <p class="sub" style="margin-bottom:4px;">像敲響一口古鐘一樣，向前輕輕一揮</p>

  <div class="bell-stage">
    <canvas id="ripple-canvas"></canvas>
    <div class="bell-wrap" id="bell-wrap">
      <svg viewBox="0 0 200 220" fill="none">
        <defs>
          <linearGradient id="bronzeGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#caa14a"/>
            <stop offset="45%" stop-color="#8a5a24"/>
            <stop offset="100%" stop-color="#4a2c12"/>
          </linearGradient>
        </defs>
        <rect x="92" y="6" width="16" height="18" rx="3" fill="url(#bronzeGrad)"/>
        <path d="M100 22c34 0 58 30 58 66v16l14 26c2 4-1 9-6 9H34c-5 0-8-5-6-9l14-26V88c0-36 24-66 58-66z" fill="url(#bronzeGrad)" stroke="#2b1808" stroke-width="1.5"/>
        <ellipse cx="100" cy="205" rx="70" ry="9" fill="#1a0f0a"/>
        <path d="M100 40c26 0 46 22 46 48" stroke="rgba(255,235,190,.35)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="100" cy="150" r="4" fill="#2b1808"/>
      </svg>
    </div>
  </div>

  <div class="status-line" id="status-line"><span class="status-dot"></span><span id="status-text">感應中，等待撞擊…</span></div>

  <div class="lookup-prompt" id="lookup-prompt">
    <span class="lookup-arrow">↑</span>
    <p class="sub" style="margin-bottom:0;">鐘聲已響，將手機朝向天空</p>
    <div class="fallback-row">
      <button class="btn ghost" id="btn-force-sky">看不到反應？點此仰望星空</button>
    </div>
  </div>

  <div class="fallback-row" id="fallback-strike-row">
    <button class="btn ghost" id="btn-force-strike">桌面測試：模擬撞鐘</button>
  </div>

  <div class="hud" id="hud">motion 尚未偵測</div>
</section>

<!-- ================= Scene 3 : Sky ================= -->
<section class="scene" id="scene-sky">
  <canvas id="star-canvas"></canvas>
  <div class="sky-copy">
    <div class="eyebrow">吉羊座 · 已點亮</div>
    <h1 class="headline" style="font-size:clamp(24px,6.5vw,34px);">你的心燈，已加入星海</h1>
    <p class="sub">與此刻所有仰望天空的人，一同點亮這片星空</p>
    <p class="sky-count"><b id="light-count">—</b> 人已點亮心燈</p>
    <div class="fallback-row">
      <button class="btn ghost" id="btn-reset">重新體驗</button>
    </div>
  </div>
</section>

<script>
(function(){
  "use strict";

  var STRIKE_THRESHOLD = 16;      // m/s^2 magnitude of delta-acceleration to count as a "strike"
  var STRIKE_COOLDOWN   = 1200;   // ms
  var SKY_BETA_MIN = -150, SKY_BETA_MAX = -30; // generous "phone tilted toward sky" window

  var sceneIntro = document.getElementById('scene-intro');
  var sceneBell  = document.getElementById('scene-bell');
  var sceneSky   = document.getElementById('scene-sky');
  var scenes = [sceneIntro, sceneBell, sceneSky];

  function showScene(el){
    scenes.forEach(function(s){ s.classList.toggle('active', s === el); });
  }

  var state = 'intro'; // intro -> armed -> struck -> sky
  var audioCtx = null;

  /* ---------------- Audio: synthesized temple bell ---------------- */
  function ensureAudio(){
    if (!audioCtx){
      var AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playBell(){
    var ctx = ensureAudio();
    var now = ctx.currentTime;
    var master = ctx.createGain();
    master.gain.value = 0.85;
    master.connect(ctx.destination);

    // inharmonic partials approximate a struck bronze bell
    var partials = [1, 1.99, 2.41, 3.06, 3.54, 4.23, 5.4];
    var fundamental = 108;
    partials.forEach(function(ratio, i){
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = fundamental * ratio;
      var g = ctx.createGain();
      var amp = 0.55 / (i + 1);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.linearRampToValueAtTime(amp, now + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 4.2 + i * 0.35);
      osc.connect(g).connect(master);
      osc.start(now);
      osc.stop(now + 5);
    });

    // strike transient
    var dur = 0.06;
    var buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < data.length; i++){
      data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    }
    var noise = ctx.createBufferSource();
    noise.buffer = buf;
    var filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 900;
    filt.Q.value = 0.7;
    var ng = ctx.createGain();
    ng.gain.value = 0.5;
    noise.connect(filt).connect(ng).connect(master);
    noise.start(now);
  }

  /* ---------------- Vibration ---------------- */
  function vibrateStrike(){
    if (navigator.vibrate) navigator.vibrate([300, 50, 100, 50]);
  }

  /* ---------------- Ripple particles (Canvas 2D) ---------------- */
  var rippleCanvas = document.getElementById('ripple-canvas');
  var rctx = rippleCanvas.getContext('2d');
  var particles = [];
  var rippleRAF = null;

  function sizeRippleCanvas(){
    var rect = rippleCanvas.getBoundingClientRect();
    rippleCanvas.width = rect.width * devicePixelRatio;
    rippleCanvas.height = rect.height * devicePixelRatio;
  }

  function spawnRipple(){
    sizeRippleCanvas();
    var cx = rippleCanvas.width / 2, cy = rippleCanvas.height / 2;
    var colors = ['#ffd875', '#d4af37', '#e8613f', '#c0392b'];
    particles = [];
    var n = 90;
    for (var i = 0; i < n; i++){
      var angle = (Math.PI * 2 * i) / n + Math.random() * 0.4;
      var speed = (2.4 + Math.random() * 3.2) * devicePixelRatio;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.012 + Math.random() * 0.012,
        size: (2 + Math.random() * 3) * devicePixelRatio,
        color: colors[i % colors.length]
      });
    }
    // shockwave ring state, drawn alongside particles
    particles.ring = { r: 0, maxR: Math.min(cx, cy) * 0.95, life: 1 };
    if (rippleRAF) cancelAnimationFrame(rippleRAF);
    animateRipple();
  }

  function animateRipple(){
    rctx.clearRect(0, 0, rippleCanvas.width, rippleCanvas.height);
    var alive = false;

    var ring = particles.ring;
    if (ring && ring.life > 0){
      ring.r += (ring.maxR - ring.r) * 0.09;
      ring.life -= 0.02;
      rctx.beginPath();
      rctx.arc(rippleCanvas.width/2, rippleCanvas.height/2, ring.r, 0, Math.PI*2);
      rctx.strokeStyle = 'rgba(255,216,117,' + Math.max(ring.life,0) + ')';
      rctx.lineWidth = 2 * devicePixelRatio;
      rctx.stroke();
      alive = true;
    }

    for (var i = 0; i < particles.length; i++){
      var p = particles[i];
      if (p.life <= 0) continue;
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.965; p.vy *= 0.965;
      p.life -= p.decay;
      if (p.life > 0){
        alive = true;
        rctx.globalAlpha = Math.max(p.life, 0);
        rctx.fillStyle = p.color;
        rctx.beginPath();
        rctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        rctx.fill();
      }
    }
    rctx.globalAlpha = 1;
    if (alive) rippleRAF = requestAnimationFrame(animateRipple);
  }

  /* ---------------- Strike flow ---------------- */
  var bellWrap = document.getElementById('bell-wrap');
  var statusText = document.getElementById('status-text');
  var lookupPrompt = document.getElementById('lookup-prompt');
  var fallbackStrikeRow = document.getElementById('fallback-strike-row');
  var hud = document.getElementById('hud');

  function triggerStrike(){
    if (state !== 'armed') return;
    state = 'struck';
    statusText.textContent = '鐘聲響起…';
    fallbackStrikeRow.style.display = 'none';

    playBell();
    vibrateStrike();
    spawnRipple();

    bellWrap.classList.remove('swing');
    void bellWrap.offsetWidth; // restart animation
    bellWrap.classList.add('swing');

    setTimeout(function(){
      lookupPrompt.classList.add('show');
      statusText.textContent = '請將手機朝向天空';
    }, 900);
  }

  /* ---------------- Motion: detect the bell-strike gesture ---------------- */
  var lastStrikeTime = 0;
  function onDeviceMotion(e){
    var acc = e.acceleration && (e.acceleration.x || e.acceleration.y || e.acceleration.z) ? e.acceleration : e.accelerationIncludingGravity;
    if (!acc) return;
    var mag = Math.sqrt((acc.x||0)*(acc.x||0) + (acc.y||0)*(acc.y||0) + (acc.z||0)*(acc.z||0));
    hud.textContent = '加速度感應中 · ' + mag.toFixed(1) + ' m/s²';
    var now = performance.now();
    if (state === 'armed' && mag > STRIKE_THRESHOLD && now - lastStrikeTime > STRIKE_COOLDOWN){
      lastStrikeTime = now;
      triggerStrike();
    }
  }

  /* ---------------- Orientation: detect "looking at the sky" ---------------- */
  var lastBeta = null;
  function onDeviceOrientation(e){
    if (typeof e.beta === 'number'){
      lastBeta = e.beta;
      if (state === 'struck'){
        hud.textContent = '傾斜角 β ' + e.beta.toFixed(0) + '°（面向天空區間約 ' + SKY_BETA_MIN + '° ~ ' + SKY_BETA_MAX + '°）';
        if (e.beta > SKY_BETA_MIN && e.beta < SKY_BETA_MAX){
          goToSky();
        }
      }
    }
  }

  function goToSky(){
    if (state !== 'struck') return;
    state = 'sky';
    showScene(sceneSky);
    startStarfield();
  }

  document.getElementById('btn-force-sky').addEventListener('click', goToSky);
  document.getElementById('btn-force-strike').addEventListener('click', function(){
    if (state === 'armed') triggerStrike();
  });

  /* ---------------- Starfield + constellation ---------------- */
  var starCanvas = document.getElementById('star-canvas');
  var sctx = starCanvas.getContext('2d');
  var stars = [], constellationPts = [], otherLights = [];
  var skyRAF = null;
  var igniteProgress = 0;

  var GOAT_SHAPE = [
    [0,-0.52],[-0.34,-0.36],[-0.56,-0.16],[-0.5,0.04],[-0.34,0.10],
    [-0.24,0.16],[0,0.5],[0.24,0.16],[0.34,0.10],[0.5,0.04],
    [0.56,-0.16],[0.34,-0.36],[0,-0.52]
  ];
  var GOAT_EYES = [[-0.12,-0.08],[0.12,-0.08]];

  function sizeStarCanvas(){
    starCanvas.width = window.innerWidth * devicePixelRatio;
    starCanvas.height = window.innerHeight * devicePixelRatio;
  }

  function buildSky(){
    sizeStarCanvas();
    var w = starCanvas.width, h = starCanvas.height;
    stars = [];
    var n = Math.floor((w * h) / 9000);
    for (var i = 0; i < n; i++){
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h * 0.82,
        r: Math.random() * 1.4 * devicePixelRatio + 0.3,
        tw: Math.random() * Math.PI * 2,
        speed: 0.01 + Math.random() * 0.02
      });
    }
    var cx = w * 0.5, cy = h * 0.36, scale = Math.min(w, h) * 0.34;
    constellationPts = GOAT_SHAPE.map(function(p){ return { x: cx + p[0]*scale, y: cy + p[1]*scale }; });
    var eyePts = GOAT_EYES.map(function(p){ return { x: cx + p[0]*scale, y: cy + p[1]*scale }; });
    constellationPts.eyes = eyePts;

    otherLights = [];
    var m = 46;
    for (var j = 0; j < m; j++){
      otherLights.push({
        x: Math.random() * w,
        y: h * 0.15 + Math.random() * h * 0.6,
        r: (1.2 + Math.random() * 1.8) * devicePixelRatio,
        tw: Math.random() * Math.PI * 2,
        speed: 0.015 + Math.random() * 0.02
      });
    }
  }

  function startStarfield(){
    buildSky();
    igniteProgress = 0;
    var startCount = 12480 + Math.floor(Math.random() * 30);
    var counterEl = document.getElementById('light-count');
    var target = startCount + 1;
    var shown = startCount;
    var counterTimer = setInterval(function(){
      shown += 1;
      counterEl.textContent = shown.toLocaleString('zh-Hant');
      if (shown >= target) clearInterval(counterTimer);
    }, 220);
    if (skyRAF) cancelAnimationFrame(skyRAF);
    animateSky();
  }

  function animateSky(t){
    var w = starCanvas.width, h = starCanvas.height;
    sctx.clearRect(0, 0, w, h);

    stars.forEach(function(s){
      s.tw += s.speed;
      var a = 0.35 + Math.sin(s.tw) * 0.35 + 0.3;
      sctx.globalAlpha = Math.max(a, 0.1);
      sctx.fillStyle = '#eef1ff';
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      sctx.fill();
    });

    otherLights.forEach(function(s){
      s.tw += s.speed;
      var a = 0.4 + Math.sin(s.tw) * 0.3 + 0.3;
      sctx.globalAlpha = Math.max(a, 0.15);
      sctx.fillStyle = '#ffd875';
      sctx.shadowColor = '#ffd875';
      sctx.shadowBlur = 6 * devicePixelRatio;
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      sctx.fill();
      sctx.shadowBlur = 0;
    });

    sctx.globalAlpha = 1;

    if (igniteProgress < 1) igniteProgress = Math.min(1, igniteProgress + 0.012);
    var revealCount = Math.floor(constellationPts.length * igniteProgress);

    sctx.strokeStyle = 'rgba(255,216,117,' + (0.75 * igniteProgress) + ')';
    sctx.lineWidth = 1.6 * devicePixelRatio;
    sctx.beginPath();
    for (var i = 0; i < revealCount; i++){
      var p = constellationPts[i];
      if (i === 0) sctx.moveTo(p.x, p.y); else sctx.lineTo(p.x, p.y);
    }
    sctx.stroke();

    for (var j = 0; j < revealCount; j++){
      var pt = constellationPts[j];
      var pulse = 1.6 + Math.sin(performance.now()/260 + j) * 0.6;
      sctx.fillStyle = '#fff3d6';
      sctx.shadowColor = '#ffd875';
      sctx.shadowBlur = 14 * devicePixelRatio;
      sctx.beginPath();
      sctx.arc(pt.x, pt.y, pulse * devicePixelRatio, 0, Math.PI*2);
      sctx.fill();
      sctx.shadowBlur = 0;
    }

    if (igniteProgress > 0.6){
      constellationPts.eyes.forEach(function(pt){
        sctx.fillStyle = '#fff3d6';
        sctx.shadowColor = '#ffd875';
        sctx.shadowBlur = 10 * devicePixelRatio;
        sctx.beginPath();
        sctx.arc(pt.x, pt.y, 1.8 * devicePixelRatio, 0, Math.PI*2);
        sctx.fill();
        sctx.shadowBlur = 0;
      });
    }

    skyRAF = requestAnimationFrame(animateSky);
  }

  window.addEventListener('resize', function(){
    if (state === 'sky') buildSky();
  });

  /* ---------------- Start / permissions ---------------- */
  var permissionNote = document.getElementById('permission-note');

  // iOS Safari refuses to expose/trigger the sensor permission APIs at all
  // outside a secure context (https:// or localhost). Opening the file directly
  // via file:// or over plain http:// will make requestPermission silently
  // no-op — no dialog, no error, sensors just never fire. Surface that clearly
  // instead of failing silently.
  if (!window.isSecureContext){
    permissionNote.innerHTML = '⚠️ 目前並非安全連線（https）。iOS 上動作／方向感應權限只有在 https 或 localhost 下才會跳出授權視窗，直接開啟本機檔案或 http 網址時不會有任何提示、感應也不會作用。請將此檔案部署到 https 網址（或用 <code>localhost</code>）後再測試，暫時可先用畫面下方的「模擬」按鈕測試流程。';
    permissionNote.style.color = 'var(--ember-bright)';
  }

  document.getElementById('btn-start').addEventListener('click', function(){
    ensureAudio();

    var motionApiExists = typeof DeviceMotionEvent !== 'undefined';
    var orientApiExists = typeof DeviceOrientationEvent !== 'undefined';
    var needsMotionPerm = motionApiExists && typeof DeviceMotionEvent.requestPermission === 'function';
    var needsOrientPerm = orientApiExists && typeof DeviceOrientationEvent.requestPermission === 'function';

    function attachListeners(){
      window.addEventListener('devicemotion', onDeviceMotion);
      window.addEventListener('deviceorientation', onDeviceOrientation);
    }

    function enterBellScene(){
      state = 'armed';
      showScene(sceneBell);
      statusText.textContent = '感應中，等待撞擊…';
    }

    if (needsMotionPerm || needsOrientPerm){
      Promise.all([
        needsMotionPerm ? DeviceMotionEvent.requestPermission() : Promise.resolve('granted'),
        needsOrientPerm ? DeviceOrientationEvent.requestPermission() : Promise.resolve('granted')
      ]).then(function(results){
        attachListeners();
        enterBellScene();
        // Note: on iOS, motion + orientation share ONE system permission
        // ("動作與方向") — calling both requestPermission() in the same click
        // only shows a single dialog. That is expected, not a bug.
        var motionState = results[0], orientState = results[1];
        if (motionState !== 'granted' || orientState !== 'granted'){
          hud.textContent = '權限狀態 — 動作:' + motionState + ' / 方向:' + orientState + '（未授權時請用下方「模擬」按鈕測試）';
        } else {
          hud.textContent = '權限已授權，感應中…';
        }
      }).catch(function(err){
        // requestPermission rejects (rather than resolving 'denied') when
        // called outside a secure context or outside a user gesture.
        attachListeners();
        enterBellScene();
        hud.textContent = '感應權限請求失敗：' + err.message + '（請確認為 https 連線，並直接點擊按鈕觸發）';
      });
    } else if (!motionApiExists && !orientApiExists){
      attachListeners();
      enterBellScene();
      hud.textContent = '此瀏覽器不支援動作／方向感應 API，僅能用「模擬」按鈕測試';
    } else {
      attachListeners();
      enterBellScene();
    }
  });

  document.getElementById('btn-reset').addEventListener('click', function(){
    state = 'intro';
    lastStrikeTime = 0;
    igniteProgress = 0;
    lookupPrompt.classList.remove('show');
    fallbackStrikeRow.style.display = 'flex';
    bellWrap.classList.remove('swing');
    if (skyRAF) cancelAnimationFrame(skyRAF);
    showScene(sceneIntro);
  });

})();
</script>
</body>
</html>
